<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENE-BM | Login</title>
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    
    <!-- Background Animated Gradients -->
    <div class="blob-cont">
        <div class="yellow blob"></div>
        <div class="red blob"></div>
        <div class="green blob"></div>
    </div>

    <!-- Main Glass Panel -->
    <div class="glass-panel" style="max-width: 400px;">
        <div class="header" style="text-align: center; margin-bottom: 1rem;">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Renechip Logo" style="max-width: 220px; height: auto; display: block; margin: 0 auto 1rem;">
            <p>Access Portal</p>
        </div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form class="login-form" method="POST" action="{{ url_for('login') }}">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter username">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter password">
            </div>

            <button type="submit" class="glow-on-hover" style="margin-top: 10px;">
                <span class="btn-text">Login</span>
            </button>
        </form>
    </div>

</body>
</html>
